name: AI Morning Brief - Daily Auto Publish

on:
  schedule:
    # 7:00 AM JST = 22:00 UTC (previous day)
    - cron: '0 22 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  generate-episode:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install feedparser trafilatura google-genai edge-tts pydub python-dotenv

      - name: Restore previous feed
        run: |
          mkdir -p src/output
          cp -f feed.xml src/output/feed.xml 2>/dev/null || true

      - name: Generate episode
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_PAGES_URL: https://belieeve.github.io/ai-news-podcast
        run: |
          cd src
          mkdir -p output/episodes output/scripts logs
          python main.py --no-deploy

      - name: Copy generated files
        run: |
          mkdir -p episodes
          cp -f src/output/episodes/*.mp3 episodes/ 2>/dev/null || true
          cp -f src/output/feed.xml feed.xml 2>/dev/null || true

      - name: Cleanup old episodes (keep 50)
        run: |
          cd episodes
          ls -t episode_*.mp3 2>/dev/null | tail -n +51 | xargs rm -f || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add episodes/ feed.xml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Add episode $(date +%Y-%m-%d)"
          git push
