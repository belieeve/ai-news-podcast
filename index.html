<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あさイチAI - AIニュースPodcast</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, 'Hiragino Sans', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; max-width: 600px; padding: 40px 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 8px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #888; font-size: 1.1rem; margin-bottom: 40px; }
        .description { color: #ccc; line-height: 1.8; margin-bottom: 40px; }
        .links { display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .links a { display: inline-block; padding: 12px 32px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 1rem; transition: transform 0.2s; }
        .links a:hover { transform: scale(1.05); }
        .spotify { background: #1DB954; color: #fff; }
        .rss { background: #f90; color: #fff; }
        .apple { background: #fc3c44; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>あさイチAI</h1>
        <p class="subtitle">AIニュースを毎朝お届けするPodcast</p>
        <p class="description">
            タケシとアイの2人が、AIの最新ニュース・ツールのアップデート情報を<br>
            毎朝わかりやすくお届けします。
        </p>
        <div class="links">
            <a href="feed.xml" class="rss">RSS Feed</a>
        </div>
    </div>
</body>
</html>
